<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KittyVerse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/config.js"></script>
</head>
<body>

<div class="login-container">
    <div class="left">
        <!-- Floating Cute Paws -->
        <span class="cute-paw text-xs" style="top: 10%; left: 10%; animation-delay: 0s;">🐾</span>
        <span class="cute-paw text-sm" style="top: 25%; left: 30%; animation-delay: 1.5s;">🐾</span>
        <span class="cute-paw text-xs" style="top: 45%; left: 8%; animation-delay: 3s;">🐾</span>
        <span class="cute-paw text-sm" style="top: 70%; left: 20%; animation-delay: 0.5s;">🐾</span>
        <span class="cute-paw text-lg" style="top: 15%; right: 12%; animation-delay: 2s;">🐾</span>
        <span class="cute-paw text-xs" style="top: 35%; right: 28%; animation-delay: 1s;">🐾</span>
        <span class="cute-paw text-sm" style="top: 55%; right: 10%; animation-delay: 4.5s;">🐾</span>
        <span class="cute-paw text-xs" style="top: 75%; right: 25%; animation-delay: 2.5s;">🐾</span>
        <span class="cute-paw text-sm" style="bottom: 12%; left: 15%; animation-delay: 1.8s;">🐾</span>
        <span class="cute-paw text-xs" style="bottom: 18%; right: 15%; animation-delay: 3.2s;">🐾</span>

        <div class="left-content">
            <h1>KittyVerse</h1>
            <p class="tagline">Where every paw finds a home, because every paw deserves a forever home.</p>
        </div>
        <footer class="branding-footer">Powered by Team FannyPaws 🐾</footer>
    </div>

    <div class="right">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Sign in to continue</p>
            <form>
                <input type="email" id="email-input" placeholder="Email" required>
                <input type="password" id="password-input" placeholder="Password" required>
                
                <button type="submit" id="submit-btn">Sign In</button>
            </form>
            <p class="toggle-text" style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--gray);">
                Don't have an account? <a href="signup.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create Account</a>
            </p>
        </div>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
